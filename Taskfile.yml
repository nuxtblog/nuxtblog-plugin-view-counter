version: "3"

tasks:
  default:
    desc: Build frontend
    cmds:
      - task: web:build

  web:install:
    desc: Install frontend dependencies
    dir: web
    cmds:
      - pnpm install --frozen-lockfile
    status:
      - test -d node_modules/.pnpm

  web:build:
    desc: Build frontend assets
    dir: web
    deps: [web:install]
    cmds:
      - pnpm build

  web:check:
    desc: Type check frontend
    dir: web
    deps: [web:install]
    cmds:
      - pnpm check

  web:dev:
    desc: Watch mode for frontend
    dir: web
    deps: [web:install]
    cmds:
      - pnpm dev

  check:
    desc: Run all checks (Go vet + TS typecheck)
    cmds:
      - go vet ./...
      - task: web:check

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf web/dist
