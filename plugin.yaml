# nuxtblog plugin manifest — unified config (single source of truth)
id: nuxtblog-plugin-view-counter
title: 浏览量统计
version: 2.0.0
icon: i-tabler-chart-bar
author: nuxtblog
description: 精准文章浏览量统计与可视化分析
license: MIT
trust_level: official
sdk_version: "1.0.0"

type: builtin
runtime: compiled
bundled: true

# 前端产物
admin_js: admin.mjs
public_js: public.mjs

# 管理员设置
settings:
  - key: count_mode
    label: 计数模式
    type: select
    default: unique_ip
    options: [every_visit, unique_ip, unique_user]
    description: "every_visit = 每次刷新都计数；unique_ip = 同 IP 24h 内只计一次；unique_user = 登录用户去重"
    group: 基础配置

  - key: exclude_admin
    label: 排除管理员访问
    type: boolean
    default: true
    group: 基础配置

  - key: retention_days
    label: 详细日志保留天数
    type: number
    default: 90
    description: 超过此天数的逐条访问日志将被清理（聚合数据永久保留）
    group: 存储

# 前端页面注册
pages:
  - path: /admin/analytics
    slot: admin
    component: AnalyticsDashboard
    title: 浏览统计
    nav:
      group: 数据
      icon: i-tabler-chart-bar
      order: 60

# UI 贡献点
contributes:
  commands:
    - id: "view-counter:export"
      title: 导出浏览数据
      title_en: Export View Data
      icon: i-tabler-download
  menus:
    post-list:row-action:
      - command: "view-counter:export"

# 数据库迁移
migrations:
  - version: 1
    up: >
      CREATE TABLE IF NOT EXISTS plugin_nuxtblog_view_counter_logs
      (id INTEGER PRIMARY KEY AUTOINCREMENT,
       post_id INTEGER NOT NULL,
       user_id INTEGER DEFAULT 0,
       ip_hash TEXT NOT NULL,
       user_agent TEXT,
       referer TEXT,
       created_at DATETIME DEFAULT CURRENT_TIMESTAMP)
    down: DROP TABLE plugin_nuxtblog_view_counter_logs

  - version: 2
    up: >
      CREATE INDEX IF NOT EXISTS idx_pvc_logs_post_id ON plugin_nuxtblog_view_counter_logs (post_id);
      CREATE INDEX IF NOT EXISTS idx_pvc_logs_created ON plugin_nuxtblog_view_counter_logs (created_at)
    down: >
      DROP INDEX idx_pvc_logs_post_id;
      DROP INDEX idx_pvc_logs_created

  - version: 3
    up: >
      CREATE TABLE IF NOT EXISTS plugin_nuxtblog_view_counter_daily
      (post_id INTEGER NOT NULL,
       date TEXT NOT NULL,
       views INTEGER DEFAULT 0,
       unique_views INTEGER DEFAULT 0,
       PRIMARY KEY (post_id, date))
    down: DROP TABLE plugin_nuxtblog_view_counter_daily

# 自定义路由
routes:
  - method: POST
    path: /api/plugin/view-counter/track
    auth: public
    description: 记录一次页面浏览

  - method: GET
    path: /api/plugin/view-counter/stats
    auth: admin
    description: 获取浏览统计数据

  - method: GET
    path: /api/plugin/view-counter/post/{id}
    auth: admin
    description: 获取单篇文章的详细浏览趋势
