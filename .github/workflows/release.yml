name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Package plugin
        run: zip -r plugin.zip plugin.yaml plugin.go go.mod go.sum web/dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" plugin.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes

  submit-pr:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Submit PR to registry
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "REGISTRY_PAT not set, skipping PR submission"
            exit 0
          fi
          node .github/scripts/submit-pr.mjs
